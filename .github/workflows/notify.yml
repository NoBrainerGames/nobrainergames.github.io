name: Notifying

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *

concurrency:
  group: notifying-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: Post updates
      run: |
        DAY_OFFSET=0
        DATE_TODAY=$(date --date="$((-$DAY_OFFSET)) day" +'%Y-%m-%d')
        DATE_YESTERDAY=$(date --date="$((-$DAY_OFFSET - 1)) day" +'%Y-%m-%d')

        TODAY_COMMIT=$(git rev-list -n 1 --first-parent --before="$DATE_TODAY 00:00:00" staging)
        PREVIOUS_COMMIT=$(git rev-list -n 1 --first-parent --before="$DATE_YESTERDAY 00:00:00" staging)

        if [ ! -z "$TODAY_COMMIT" ]; then
          echo "Checking files changed between $PREVIOUS_COMMIT and $TODAY_COMMIT..."

          ADDED_FILES=$(git diff --name-only --diff-filter=A $PREVIOUS_COMMIT $TODAY_COMMIT | grep \.md$)
          MODIFIED_FILES=$(git diff --name-only --diff-filter=M $PREVIOUS_COMMIT $TODAY_COMMIT | grep \.md$)

          ADDED_COUNT=0
          MODIFIED_COUNT=0

          TITLE_URL=

          while IFS='' read -r -d '' filename; do
            if [ -f "$filename" ]; then
              if [ $ADDED_COUNT -eq 0 ]; then
                FILEPATH=${filename#"docs/"}
                FILEPATH=${FILEPATH%".md"}
                FILEPATH=${FILEPATH/ /"%20"}
                TITLE_URL="https://nobrainergames.com/$FILEPATH/"
              fi
              ADDED_COUNT=$((ADDED_COUNT+1))
            fi
          done < <(printf "%s\0" "$ADDED_FILES" | tr "\n" "\0")

          while IFS='' read -r -d '' filename; do
            if [ -f "$filename" ]; then
              if [ $ADDED_COUNT -eq 0 ]; then
                if [ $MODIFIED_COUNT -eq 0 ]; then
                  FILEPATH=${filename#"docs/"}
                  FILEPATH=${FILEPATH%".md"}
                  FILEPATH=${FILEPATH/ /"%20"}
                  TITLE_URL="https://nobrainergames.com/$FILEPATH/"
                fi
              fi
              MODIFIED_COUNT=$((MODIFIED_COUNT+1))
            fi
          done < <(printf "%s\0" "$MODIFIED_FILES" | tr "\n" "\0")

          echo "Found $ADDED_COUNT added files and $MODIFIED_COUNT modified files."

          curl -H "Content-Type: application/json" -d \
            "{\"username\": \"No Brainer Games\",\
              \"content\": \"Published $ADDED_COUNT new pages and changed $MODIFIED_COUNT pages.\n\n$TITLE_URL\"}" \
            "${{ secrets.DISCORD_SITE_UPDATES_WEBHOOK }}"
        fi
